name: Python build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libeigen3-dev libopencv-dev libpcl-dev

      - name: Install Python build dependencies
        run: python -m pip install --upgrade pip build pytest


      - name: Build wheel and sdist
        run: python -m build --wheel --sdist

      - name: Install built wheel
        run: python -m pip install dist/*.whl

      - name: Smoke-test imports
        run: |
          python -c "import gpd.core; print(gpd.core.__version__)"
          python -c "from gpd.core import Cloud, GraspDetector, Grasp"
